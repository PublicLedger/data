name: Release and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message || '', '[skip ci]')
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run lint and tests
        run: |
          npm run lint
          npm test

      - name: Get next version
        id: version
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Get latest semver tag (strict x.y.z format only, no suffixes)
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)

          # If no tags exist yet, derive the starting version from package.json
          if [[ -z "$LATEST" ]]; then
            VERSION=$(node -p "require('./package.json').version")
            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "ERROR: package.json version '$VERSION' is not a valid x.y.z semver version"
              exit 1
            fi
            TAG="v${VERSION}"
            echo "No existing tags, starting from package.json version: $VERSION"
          else
            # Parse current version (strip everything after the digits)
            MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\..*/\1/')
            MINOR=$(echo "$LATEST" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
            PATCH=$(echo "$LATEST" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\).*/\1/')
            
            # Check commit message for version bump signals (via env var to avoid injection)
            if echo "$COMMIT_MESSAGE" | grep -qiE '\[major\]|(^|[^[:alnum:]_])major([^[:alnum:]_]|$)'; then
              # Major bump: x.0.0
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              BUMP_TYPE="major"
            elif echo "$COMMIT_MESSAGE" | grep -qiE '\[minor\]|(^|[^[:alnum:]_])minor([^[:alnum:]_]|$)'; then
              # Minor bump: x.y.0
              MINOR=$((MINOR + 1))
              PATCH=0
              BUMP_TYPE="minor"
            else
              # Default: patch bump x.y.z
              PATCH=$((PATCH + 1))
              BUMP_TYPE="patch"
            fi
            
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            TAG="v${VERSION}"
            echo "Bumping $BUMP_TYPE version from $LATEST to $TAG"
          fi

          # Validate tag doesn't already exist
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "ERROR: Tag $TAG already exists!"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Update package-lock.json
        run: npm install --package-lock-only

      - name: Format updated files
        run: npx prettier --write package.json package-lock.json

      - name: Commit version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json

          # Only commit and push if there are actual changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: Release ${{ steps.version.outputs.version }} [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No version changes to commit"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true

      - name: Update floating tags
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          MAJOR=$(echo "$TAG" | sed 's/v\([0-9]*\).*/\1/')
          git tag -f latest
          git push origin latest --force
          git tag -f "v${MAJOR}"
          git push origin "v${MAJOR}" --force

  deploy:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          PUBLIC_BASE_URL: https://data.publicledger.news
          PUBLIC_TITLE: "Public Ledger Data API & components"
          PUBLIC_TAGLINE: "Data journalism for The Public Ledger"
          PUBLIC_HINT_NAME: "Sec-CH-Prefers-Color-Scheme"
          PUBLIC_RELEASE_VERSION: ${{ needs.release.outputs.tag }}
          PUBLIC_RELEASE_PUBLISHED_AT: ${{ github.event.head_commit.timestamp }}
          PUBLIC_RELEASE_CREATED_AT: ${{ github.event.head_commit.timestamp }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./build"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
