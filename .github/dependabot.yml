version: 2
updates:
  # Maintain npm dependencies (SvelteKit app)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Python dependencies (notebooks) are manually maintained since they're rarely used
  # Pinned in pyproject.toml to reduce churn; update only when actively working on notebooks

  # Maintain GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
